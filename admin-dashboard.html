<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | The Healthy Lab</title>
  <link rel="shortcut icon" href="./assets/images/50Tag.png" type="image/png">
  <link rel="stylesheet" href="./assets/css/golden-harvest.css">
  <link rel="stylesheet" href="./assets/css/nav.css">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 150px auto 100px;
      padding: 30px;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .summary-card {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid #eee;
    }
    .summary-card h3 { font-size: 1.6rem; color: #666; margin-bottom: 10px; }
    .summary-card p { font-size: 2.8rem; font-weight: bold; color: var(--cinnabar); }
    
    .section-title { font-size: 2.2rem; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
    
    table { width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 1.4rem; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #f2f2f2; }
    
    .btn-action { padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; color: white; background: var(--deep-saffron); font-size: 1.2rem; }
    .btn-danger { background: #e74c3c; }
    .btn-success { background: #2ecc71; }
  </style>
</head>
<body>
  <header class="header active" data-header style="background-color: var(--cinnabar); padding-block: 15px;">
    <div class="container">
      <div class="h1">
        <a href="index.html" class="logo" style="color: white; font-weight: 700; font-size: 2.5rem; letter-spacing: -1px; text-decoration: none;">The Healthy Lab</a>
      </div>
      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li class="nav-item"><a href="index.html" class="navbar-link">Home</a></li>
        </ul>
      </nav>
      <div class="header-btn-group"></div>
    </div>
  </header>

  <main>
    <section class="dashboard-container">
      <h2 style="font-size: 2.8rem; margin-bottom: 30px; color: var(--eerie-black-1);">Admin Dashboard</h2>
      
      <div class="summary-grid" id="summary-container">
        <!-- Summary cards loaded via JS -->
      </div>

      <h3 class="section-title">All Orders</h3>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Total</th>
              <th>Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="orders-table"></tbody>
        </table>
      </div>

      <h3 class="section-title">All Products</h3>
      <div style="margin-bottom: 10px;">
        <button class="btn-action btn-success" onclick="document.getElementById('product-form').style.display='block'">+ Add Product</button>
      </div>
      
      <div id="product-form" style="display:none; background:#f9f9f9; padding:20px; border-radius:8px; margin-bottom:20px;">
        <h4 style="font-size: 1.8rem; margin-bottom: 10px;" id="product-form-title">Add/Edit Product</h4>
        <input type="hidden" id="p-id">
        <input type="text" id="p-name" placeholder="Name" required style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="p-category" placeholder="Category" required style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="p-desc" placeholder="Description" required style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="number" id="p-price" placeholder="Price" step="0.01" required style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="number" id="p-cal" placeholder="Calories" required style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <input type="text" id="p-img" placeholder="Image URL (optional)" style="display:block; width:100%; margin-bottom:10px; padding:8px;">
        <button class="btn-action" onclick="saveProduct()">Save Product</button>
        <button class="btn-action btn-danger" onclick="document.getElementById('product-form').style.display='none'">Cancel</button>
      </div>

      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Available</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-table"></tbody>
        </table>
      </div>

      <h3 class="section-title">All Users</h3>
      <div style="overflow-x: auto;">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
            </tr>
          </thead>
          <tbody id="users-table"></tbody>
        </table>
      </div>

    </section>
  </main>

  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js"></script>
  <script src="./assets/js/admin-dashboard.js"></script>
</body>
</html>
