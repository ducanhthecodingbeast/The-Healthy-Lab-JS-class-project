services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5500:5500"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - healthy_lab_db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/healthy_lab.db
      - SECRET_KEY=school-project-secret
    restart: unless-stopped

volumes:
  healthy_lab_db:
