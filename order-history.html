<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order History | The Healthy Lab</title>
  <link rel="shortcut icon" href="./assets/images/50Tag.png" type="image/png">
  <link rel="stylesheet" href="./assets/css/golden-harvest.css">
  <link rel="stylesheet" href="./assets/css/nav.css?v=6">
  <link rel="stylesheet" href="./assets/css/style.css">
  <style>
    .dashboard-container {
      max-width: 800px;
      margin: 150px auto 100px;
      padding: 30px;
      background: var(--white);
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .order-card {
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }
    .status-badge {
      padding: 5px 10px;
      border-radius: 20px;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
    }
    .status-pending { background: #f39c12; }
    .status-preparing { background: #3498db; }
    .status-ready { background: #9b59b6; }
    .status-delivering { background: #e67e22; }
    .status-delivered { background: #2ecc71; }
    .status-cancelled { background: #e74c3c; }
  </style>
</head>
<body>
  <header class="header active" data-header >
    <div class="container">
      <div class="h1">
        <a href="index.html" class="logo" style="color: white; font-weight: 700; font-size: 2.5rem; letter-spacing: -1px; text-decoration: none;">The Healthy Lab</a>
      </div>
      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li class="nav-item"><a href="index.html" class="navbar-link">Home</a></li>
        </ul>
      </nav>
      <div class="header-btn-group">
      </div>
    </div>
  </header>

  <main>
    <section class="dashboard-container">
      <h2 style="font-size: 2.5rem; margin-bottom: 20px; color: var(--eerie-black-1);">My Order History</h2>
      <div id="orders-container">Loading...</div>
    </section>
  </main>

  <script src="./assets/js/api.js"></script>
  <script src="./assets/js/auth.js?v=5"></script>
  <script src="./assets/js/order-history.js"></script>
</body>
</html>
